const API = "/api/polla";
async function apiGet() {
  const r = await fetch(API);
  if (!r.ok) throw new Error("GET falló");
  return r.json();
}
async function apiPost(payload) {
  const r = await fetch(API, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
  if (!r.ok) throw new Error("POST falló");
  return r.json();
}

function scorePrediction(pred, actual) {
  if (!pred || actual?.h == null || actual?.a == null) return null;
  if (pred.h === actual.h && pred.a === actual.a) return 3;
  const ro = (x) => (x.h > x.a ? 1 : x.h < x.a ? -1 : 0);
  return ro(pred) === ro(actual) ? 1 : 0;
}

// FIFA publica el fixture en hora del Este (ET = EDT = UTC-4 en jun-jul).
const SOURCE_TZ_OFFSET = -4;
const MESES = { Jun: 5, Jul: 6, Ene: 0, Feb: 1, Mar: 2, Abr: 3, May: 4, Ago: 7, Sep: 8, Oct: 9, Nov: 10, Dic: 11 };
function matchTimestamp(dateStr) {
  if (!dateStr) return null;
  const m = dateStr.match(/(\d{1,2})\s+(\w{3}).*?·\s*(\d{1,2}):(\d{2})\s*(AM|PM)/i);
  if (!m) return null;
  const day = +m[1], mon = MESES[m[2].charAt(0).toUpperCase() + m[2].slice(1, 3).toLowerCase()];
  if (mon == null) return null;
  let hr = +m[3]; const min = +m[4]; const pm = /pm/i.test(m[5]);
  if (pm && hr !== 12) hr += 12; if (!pm && hr === 12) hr = 0;
  return Date.UTC(2026, mon, day, hr - SOURCE_TZ_OFFSET, min);
}

function PollaMundial() {
  const [matches, setMatches] = useState(SEED_MATCHES);
  const [predictions, setPredictions] = useState({});
  const [results, setResults] = useState({});
  const [champions, setChampions] = useState({});
  const [realChampion, setRealChampion] = useState("");
  const [me, setMe] = useState(PLAYERS[0]);
  const [tab, setTab] = useState("grupos");
  const [loading, setLoading] = useState(true);
  const [adminOpen, setAdminOpen] = useState(false);
  const [newM, setNewM] = useState({ group: "Octavos", home: "", away: "", date: "" });
  const [now, setNow] = useState(Date.now());
  const [confetti, setConfetti] = useState(false);
  const [saveErr, setSaveErr] = useState(false);

  useEffect(() => { const t = setInterval(() => setNow(Date.now()), 30000); return () => clearInterval(t); }, []);

  // refs para no pisar cambios locales recientes con el polling
  const lastPushRef = useRef(0);

  const applyState = (st) => {
    if (!st) return;
    setPredictions(st.predictions || {});
    setResults(st.results || {});
    setChampions(st.champions || {});
    setRealChampion(st.real_champion || "");
  };

  // ── Carga inicial ──
  useEffect(() => {
    let active = true;
    (async () => {
      try {
        const { state, matches: mt } = await apiGet();
        if (!active) return;
        applyState(state);
        if (mt) setMatches(mt);
      } catch (e) { console.error(e); setSaveErr(true); }
      setLoading(false);
    })();
    return () => { active = false; };
  }, []);

  // ── Polling: revisa cambios de los demás cada 6s (si no acabo de guardar yo) ──
  useEffect(() => {
    const t = setInterval(async () => {
      if (Date.now() - lastPushRef.current < 4000) return; // no pisar lo que acabo de escribir
      try {
        const { state, matches: mt } = await apiGet();
        applyState(state);
        if (mt) setMatches(mt);
        setSaveErr(false);
      } catch (e) { /* silencioso, reintenta en el próximo ciclo */ }
    }, 6000);
    return () => clearInterval(t);
  }, []);

  // ── Guardado ──
  const pushState = async (patch) => {
    lastPushRef.current = Date.now();
    const state = { predictions, results, champions, real_champion: realChampion, ...patch };
    try { await apiPost({ state }); setSaveErr(false); }
    catch (e) { console.error(e); setSaveErr(true); }
  };
  const pushMatches = async (m) => {
    lastPushRef.current = Date.now();
    try { await apiPost({ matches: m }); setSaveErr(false); }
    catch (e) { console.error(e); setSaveErr(true); }
  };

  const setPred = (matchId, side, val) => {
    const v = val === "" ? null : Math.max(0, parseInt(val) || 0);
    const cur = predictions[matchId]?.[me] || {};
    const next = { ...predictions, [matchId]: { ...(predictions[matchId] || {}), [me]: { ...cur, [side]: v } } };
    setPredictions(next); pushState({ predictions: next });
  };
  const setResult = (matchId, side, val) => {
    const v = val === "" ? null : Math.max(0, parseInt(val) || 0);
    const cur = results[matchId] || {};
    const next = { ...results, [matchId]: { ...cur, [side]: v } };
    setResults(next); pushState({ results: next });
  };
  const saveChampions = (c) => { setChampions(c); pushState({ champions: c }); };
  const saveRealChampion = (v) => { setRealChampion(v); pushState({ real_champion: v }); };
  const saveMatches = (m) => { setMatches(m); pushMatches(m); };

  const standings = useMemo(() => {
    const totals = Object.fromEntries(PLAYERS.map((p) => [p, { pts: 0, exact: 0, hits: 0, champ: false, streak: 0, bestStreak: 0 }]));
    const closedOrdered = matches
      .filter((m) => { const r = results[m.id]; return r && r.h != null && r.a != null; })
      .sort((a, b) => (matchTimestamp(a.date) || 0) - (matchTimestamp(b.date) || 0));
    PLAYERS.forEach((p) => {
      let run = 0;
      closedOrdered.forEach((m) => {
        const s = scorePrediction(predictions[m.id]?.[p], results[m.id]);
        if (s != null) {
          totals[p].pts += s;
          if (s === 3) totals[p].exact++;
          if (s > 0) { totals[p].hits++; run++; if (run > totals[p].bestStreak) totals[p].bestStreak = run; }
          else run = 0;
        }
      });
      totals[p].streak = run;
    });
    if (realChampion) PLAYERS.forEach((p) => { if (champions[p] === realChampion) { totals[p].pts += CHAMPION_PTS; totals[p].champ = true; } });
    const arr = Object.entries(totals).map(([n, v]) => ({ name: n, ...v }));
    const maxExact = Math.max(0, ...arr.map((r) => r.exact));
    const maxStreak = Math.max(0, ...arr.map((r) => r.bestStreak));
    arr.forEach((r) => {
      r.badges = [];
      if (maxExact > 0 && r.exact === maxExact) r.badges.push({ e: "🎯", t: "Rey del marcador exacto" });
      if (r.streak >= 3) r.badges.push({ e: "🔥", t: `Racha de ${r.streak}` });
      if (maxStreak >= 3 && r.bestStreak === maxStreak) r.badges.push({ e: "⚡", t: `Mejor racha (${r.bestStreak})` });
      if (r.champ) r.badges.push({ e: "🏆", t: "Acertó el campeón" });
    });
    return arr.sort((a, b) => b.pts - a.pts || b.exact - a.exact);
  }, [matches, predictions, results, champions, realChampion]);

  const prevExactRef = useRef(null);
  useEffect(() => {
    const mine = standings.find((r) => r.name === me);
    const cur = mine ? mine.exact : 0;
    if (prevExactRef.current != null && cur > prevExactRef.current) {
      setConfetti(true);
      const t = setTimeout(() => setConfetti(false), 3500);
      prevExactRef.current = cur; return () => clearTimeout(t);
    }
    prevExactRef.current = cur;
  }, [standings, me]);

  const grouped = useMemo(() => { const g = {}; matches.forEach((m) => { (g[m.group] ||= []).push(m); }); return g; }, [matches]);
  const bracket = useMemo(() => {
    const byRound = {};
    matches.forEach((m) => { if (isKO(m.group)) (byRound[m.group] ||= []).push(m); });
    return KO_ROUNDS.filter((r) => byRound[r] && byRound[r].length).map((r) => ({ round: r, games: byRound[r] }));
  }, [matches]);

  const flag = (t) => FLAGS[t] || "⚽";
  const isClosed = (mId) => { const r = results[mId]; return r && r.h != null && r.a != null; };
  const hasStarted = (m) => { const ts = matchTimestamp(m.date); return ts != null && now >= ts; };
  const isLocked = (m) => isClosed(m.id) || hasStarted(m);
  const betCount = (mId) => PLAYERS.filter((p) => { const x = predictions[mId]?.[p]; return x && x.h != null && x.a != null; }).length;

  const addMatch = () => {
    if (!newM.home || !newM.away) return;
    saveMatches([...matches, { id: "k" + Date.now(), ...newM }]);
    setNewM({ group: newM.group, home: "", away: "", date: "" });
  };
  const delMatch = (id) => saveMatches(matches.filter((m) => m.id !== id));

  if (loading) return <div style={{ ...S.wrap, display: "flex", alignItems: "center", justifyContent: "center", minHeight: "60vh", color: "#ffcd00" }}>Cargando la polla…</div>;

  return (
    <div style={S.wrap}>
      {confetti && (
        <div className="pm-confetti">
          {Array.from({ length: 80 }).map((_, i) => {
            const colors = ["#ffcd00", "#ffe65c", "#01bf50", "#308ff6", "#ec0000", "#ffffff"];
            return <i key={i} style={{ left: `${Math.random() * 100}%`, background: colors[i % colors.length], animationDuration: `${1.8 + Math.random() * 1.6}s`, animationDelay: `${Math.random() * 0.5}s` }} />;
          })}
        </div>
      )}

      <header style={S.header}>
        <div>
          <div style={S.kicker}><span className="pm-trophy" style={{ marginRight: 8 }}>🏆</span>POLLA MUNDIALISTA · 2026</div>
          <h1 style={S.title}>FAMILIA AVILA<span className="pm-shine">.</span></h1>
        </div>
        <div style={S.meBox}>
          <span style={{ fontSize: 12, opacity: .6, textTransform: "uppercase", letterSpacing: 1 }}>Soy</span>
          <select value={me} onChange={(e) => setMe(e.target.value)} style={S.select}>{PLAYERS.map((p) => <option key={p}>{p}</option>)}</select>
        </div>
      </header>

      {saveErr && <div style={S.errBar}>⚠️ Hubo un problema guardando. Revisa tu conexión. Tus datos podrían no haberse guardado.</div>}

      <nav style={S.nav}>
        {[["grupos", "Grupos"], ["apostar", "Apostar"], ["campeon", "Campeón 🏆"], ["bracket", "Eliminatorias"], ["tabla", "Tabla de posiciones"]].map(([k, l]) => (
          <button key={k} onClick={() => setTab(k)} className="pm-navbtn" style={{ ...S.navBtn, ...(tab === k ? S.navBtnActive : {}) }}>{l}</button>
        ))}
      </nav>

      {tab === "grupos" && (
        <div className="pm-rise">
          <p style={S.hint}>Los <b>12 grupos</b> del Mundial 2026. Pasan los <b>2 primeros</b> de cada grupo más los <b>8 mejores terceros</b>.</p>
          <div style={S.mapGrid}>
            {Object.entries(grouped).filter(([grp]) => !isKO(grp)).map(([grp, ms]) => {
              const teams = [...new Set(ms.flatMap((m) => [m.home, m.away]))];
              const isCol = teams.includes("Colombia");
              return (
                <div key={grp} style={{ ...S.mapNode, ...(isCol ? { borderColor: "#ffcd00" } : {}) }}>
                  <div style={S.mapNodeTitle}>Grupo {grp}</div>
                  {teams.map((t) => <div key={t} style={S.groupTeam}><span style={{ fontSize: 18 }}>{flag(t)}</span><span style={t === "Colombia" ? { color: "#ffcd00", fontWeight: 700 } : {}}>{t}</span></div>)}
                </div>
              );
            })}
          </div>
          <div style={{ ...S.dateLabel, marginTop: 32 }}>¿Cómo funciona el Mundial?</div>
          <div style={S.pathList}>
            {[
              { t: "Fase de grupos", d: "48 → 32", x: "12 grupos de 4. Pasan los 2 primeros + 8 mejores terceros", date: "11–27 jun", emoji: "🌎" },
              { t: "Ronda de 32", d: "32 → 16", x: "Arranca la eliminación directa", date: "28 jun – 3 jul", emoji: "⚔️" },
              { t: "Octavos", d: "16 → 8", x: "Octavos de final", date: "4–7 jul", emoji: "🔥" },
              { t: "Cuartos", d: "8 → 4", x: "Cuartos de final", date: "9–11 jul", emoji: "💪" },
              { t: "Semifinal", d: "4 → 2", x: "Los 4 mejores del mundo", date: "14–15 jul", emoji: "🌟" },
              { t: "Final", d: "2 → 1", x: "El campeón se decide en Nueva York", date: "19 jul", emoji: "🏆" },
            ].map((s) => (
              <div key={s.t} style={S.pathStep}>
                <div style={S.pathNum}>{s.emoji}</div>
                <div style={{ flex: 1 }}><div style={S.pathTitle}>{s.t} <span style={S.pathCount}>{s.d}</span></div><div style={S.pathDesc}>{s.x}</div></div>
                <div style={S.pathDate}>{s.date}</div>
              </div>
            ))}
          </div>

          <div style={{ ...S.dateLabel, marginTop: 32 }}>📋 Reglas de la polla</div>
          <div style={S.rulesGrid}>
            <div style={S.ruleCard}>
              <div style={S.rulePts}>3<span style={S.rulePtsLbl}>pts</span></div>
              <div style={{ flex: 1 }}><div style={S.ruleTitle}>Marcador exacto</div><div style={S.ruleDesc}>Le atinas al resultado completo. Predijiste 2-1 y quedó 2-1.</div></div>
            </div>
            <div style={S.ruleCard}>
              <div style={S.rulePts}>1<span style={S.rulePtsLbl}>pt</span></div>
              <div style={{ flex: 1 }}><div style={S.ruleTitle}>Acertar el resultado</div><div style={S.ruleDesc}>Aciertas quién gana, pierde o si empatan, pero no el marcador. Predijiste 2-1 y quedó 3-0: gana el mismo, +1.</div></div>
            </div>
            <div style={S.ruleCard}>
              <div style={S.rulePts}>0<span style={S.rulePtsLbl}>pts</span></div>
              <div style={{ flex: 1 }}><div style={S.ruleTitle}>Fallaste</div><div style={S.ruleDesc}>Si predijiste que ganaba uno y empató o ganó el otro, no sumas.</div></div>
            </div>
            <div style={{ ...S.ruleCard, borderLeftColor: "#22c55e" }}>
              <div style={{ ...S.rulePts, color: "#22c55e" }}>5<span style={S.rulePtsLbl}>pts</span></div>
              <div style={{ flex: 1 }}><div style={S.ruleTitle}>Campeón del mundo 🏆</div><div style={S.ruleDesc}>Eliges tu campeón en la pestaña Campeón. Si le atinas, +5 al final del torneo.</div></div>
            </div>
          </div>
          <div style={S.rulesNote}>
            🔒 Cada quien apuesta en secreto: las predicciones de los demás se revelan solo cuando arranca el partido. Tu apuesta se cierra sola al pitazo inicial.
          </div>
        </div>
      )}

      {tab === "apostar" && (
        <div className="pm-rise">
          <p style={S.hint}>Predice el marcador. <b style={{ color: "#ffcd00" }}>3 pts</b> exacto, <b style={{ color: "#ffcd00" }}>1 pt</b> por acertar quién gana. 🕐 Horas en <b>tu hora local</b>. La apuesta se cierra para todos al arrancar el partido y ahí se revelan todas.</p>
          {Object.entries(grouped).filter(([grp]) => !isKO(grp)).map(([grp, ms]) => (
            <div key={grp} style={{ marginBottom: 22 }}>
              <div style={S.dateLabel}>Grupo {grp}</div>
              {ms.map((m) => {
                const pr = predictions[m.id]?.[me] || {};
                const res = results[m.id] || {};
                const closed = res.h != null && res.a != null;
                const locked = isLocked(m), started = hasStarted(m);
                const s = scorePrediction(pr, res);
                const count = betCount(m.id);
                const wH = closed && res.h > res.a, wA = closed && res.a > res.h;
                const kick = matchTimestamp(m.date);
                const dd = kick != null ? new Date(kick).toLocaleString("es", { day: "numeric", month: "short" }) : "";
                const hh = kick != null ? new Date(kick).toLocaleString("es", { hour: "numeric", minute: "2-digit" }) : "";
                return (
                  <div key={m.id} style={{ marginBottom: 5 }}>
                    <div className="pm-card" style={S.row}>
                      <div style={S.rowMeta}><span style={S.rowTime}>{dd}</span><span style={{ ...S.rowTime, opacity: .4 }}>{hh}</span></div>
                      <div style={{ ...S.rowTeam, ...(wH ? S.bracketWin : {}) }}><span style={S.rowFlag}>{flag(m.home)}</span><span style={S.rowName}>{m.home}</span></div>
                      <input className="pm-inp" type="number" min="0" value={pr.h ?? ""} onChange={(e) => setPred(m.id, "h", e.target.value)} style={S.rowInp} disabled={locked} />
                      <span style={S.rowColon}>:</span>
                      <input className="pm-inp" type="number" min="0" value={pr.a ?? ""} onChange={(e) => setPred(m.id, "a", e.target.value)} style={S.rowInp} disabled={locked} />
                      <div style={{ ...S.rowTeam, justifyContent: "flex-end", textAlign: "right", ...(wA ? S.bracketWin : {}) }}><span style={S.rowName}>{m.away}</span><span style={S.rowFlag}>{flag(m.away)}</span></div>
                      <div style={S.rowStatus}>
                        {closed ? <span style={{ color: s === 3 ? "#22c55e" : s === 1 ? "#ffcd00" : "#a85", fontWeight: 700 }}>+{s} · {res.h}-{res.a}</span>
                          : started ? <span style={{ color: "#a85", fontWeight: 700 }}>⏱ en juego</span>
                          : <span style={{ opacity: .6 }}>🔒 {count}/{PLAYERS.length}</span>}
                      </div>
                    </div>
                    {locked && (
                      <div style={S.reveal}>
                        {PLAYERS.map((p) => {
                          const pp = predictions[m.id]?.[p]; const has = pp && pp.h != null && pp.a != null; const ps = scorePrediction(pp, res);
                          return <div key={p} style={{ ...S.revealItem, ...(p === me ? { borderColor: "#ffcd00" } : {}) }}><span style={{ opacity: .8 }}>{p}</span><span style={{ fontWeight: 700 }}>{has ? `${pp.h}-${pp.a}` : "—"}</span>{has && closed && <span style={{ fontSize: 10, color: ps === 3 ? "#22c55e" : ps === 1 ? "#ffcd00" : "#a85", fontWeight: 700 }}>+{ps}</span>}</div>;
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      )}

      {tab === "campeon" && (
        <div className="pm-rise">
          <div style={S.champHero}>
            <div style={S.champGlow} />
            <svg viewBox="0 0 120 150" width="92" height="115" className="pm-trophy" style={{ position: "relative", filter: "drop-shadow(0 10px 24px rgba(212,160,23,.45))" }}>
              <defs><linearGradient id="goldCup" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#ffe65c"/><stop offset="45%" stopColor="#ffcd00"/><stop offset="100%" stopColor="#cc9e00"/></linearGradient></defs>
              <path d="M35 20 H85 V42 Q85 70 60 78 Q35 70 35 42 Z" fill="url(#goldCup)" stroke="#b38f00" strokeWidth="1.5"/>
              <path d="M35 26 Q18 28 20 44 Q22 56 35 54" fill="none" stroke="url(#goldCup)" strokeWidth="5"/>
              <path d="M85 26 Q102 28 100 44 Q98 56 85 54" fill="none" stroke="url(#goldCup)" strokeWidth="5"/>
              <rect x="55" y="78" width="10" height="16" fill="url(#goldCup)"/>
              <path d="M44 94 H76 L72 104 H48 Z" fill="url(#goldCup)" stroke="#b38f00" strokeWidth="1"/>
              <rect x="42" y="104" width="36" height="8" rx="2" fill="#cc9e00"/>
              <rect x="38" y="112" width="44" height="9" rx="2" fill="url(#goldCup)" stroke="#b38f00" strokeWidth="1"/>
            </svg>
            <div className="pm-shine" style={{ ...S.bracketRoundLabel, fontSize: 26, marginTop: 10, marginBottom: 2 }}>¿Quién levanta la copa?</div>
            <div style={{ fontSize: 13, opacity: .7, position: "relative" }}>Elige tu campeón del mundo · vale <b style={{ color: "#ffcd00" }}>{CHAMPION_PTS} pts</b> extra 🔥</div>
          </div>
          <div className="pm-card pm-leader" style={S.champPickCard}>
            {champions[me] ? <div style={S.champBig}><span style={{ fontSize: 64, display: "block" }}>{flag(champions[me])}</span><div className="pm-shine" style={{ fontFamily: "'Anton',sans-serif", fontSize: 32, marginTop: 4 }}>{champions[me]}</div><div style={{ fontSize: 12, opacity: .6, marginTop: 4 }}>tu elección de {me}</div></div>
              : <div style={{ fontSize: 15, opacity: .7, padding: "8px 0 14px" }}>👇 Toca abajo y elige tu campeón, {me}</div>}
            <select value={champions[me] || ""} onChange={(e) => saveChampions({ ...champions, [me]: e.target.value })} style={S.champSelect} disabled={!!realChampion}>
              <option value="">— Elige tu campeón —</option>
              {[...new Set(CHAMPION_PICKS)].map((c) => <option key={c} value={c}>{flag(c)} {c}</option>)}
            </select>
            {realChampion && <div style={{ fontSize: 12, opacity: .6, marginTop: 10 }}>🔒 Las apuestas de campeón ya están cerradas.</div>}
          </div>
          <div style={S.groupLabel}>Apuestas del grupo</div>
          <div style={S.champGrid}>
            {PLAYERS.map((p) => (
              <div key={p} className="pm-card" style={{ ...S.champCell, ...(realChampion && champions[p] === realChampion ? { borderColor: "#ffcd00", background: "linear-gradient(100deg,#0a1a3a,#0e1a33)" } : {}) }}>
                <span style={{ fontSize: 13, fontWeight: 700 }}>{p}</span>
                <span style={{ fontSize: 14 }}>{champions[p] ? `${flag(champions[p])} ${champions[p]}` : <span style={{ opacity: .4 }}>sin elegir</span>}{realChampion && champions[p] === realChampion && " 🏆"}</span>
              </div>
            ))}
          </div>
          {realChampion && <div style={S.champOfficial}><span style={{ fontSize: 12, letterSpacing: 2, opacity: .6 }}>🏆 CAMPEÓN OFICIAL</span><div style={{ fontSize: 56, marginTop: 6 }}>{flag(realChampion)}</div><div className="pm-shine" style={{ fontFamily: "'Anton',sans-serif", fontSize: 36 }}>{realChampion}</div></div>}
        </div>
      )}

      {tab === "bracket" && (
        <div className="pm-rise">
          <p style={S.hint}>Llave de eliminatorias. {me === ADMIN ? "Agrégalas desde admin" : "Manuel las irá agregando"} cuando se definan los cruces. Predice el marcador aquí; se revela al terminar cada partido.</p>
          {bracket.length === 0 ? (
            <div style={S.bracketEmpty}><div style={{ fontSize: 40, marginBottom: 10 }}>🗝️</div><div style={{ fontWeight: 700, fontSize: 17, marginBottom: 6 }}>Todavía no hay eliminatorias</div><div style={{ fontSize: 14, opacity: .65, maxWidth: 380, margin: "0 auto" }}>Aparecerán aquí como llave cuando se agreguen.</div></div>
          ) : (() => {
            const Card = (m, isFinal) => {
              const pr = predictions[m.id]?.[me] || {}; const res = results[m.id] || {};
              const closed = res.h != null && res.a != null; const locked = isLocked(m);
              const s = scorePrediction(pr, res); const wH = closed && res.h > res.a, wA = closed && res.a > res.h; const count = betCount(m.id);
              return (
                <div key={m.id} className="pm-card" style={{ ...S.koGame, ...(isFinal ? S.bracketFinal : {}) }}>
                  <div style={{ ...S.koTeam, ...(wH ? S.bracketWin : {}) }}><span style={S.koName}>{flag(m.home)} {m.home}</span><input className="pm-inp" type="number" min="0" value={pr.h ?? ""} onChange={(e) => setPred(m.id, "h", e.target.value)} style={S.koInp} disabled={locked} /></div>
                  <div style={{ ...S.koTeam, ...(wA ? S.bracketWin : {}), borderTop: "1px solid #1a2a4d" }}><span style={S.koName}>{flag(m.away)} {m.away}</span><input className="pm-inp" type="number" min="0" value={pr.a ?? ""} onChange={(e) => setPred(m.id, "a", e.target.value)} style={S.koInp} disabled={locked} /></div>
                  <div style={S.koMeta}><span>{(m.date || "").split(" · ")[0]}</span>{closed ? <span style={{ color: s === 3 ? "#22c55e" : s === 1 ? "#ffcd00" : "#a85", fontWeight: 700 }}>+{s} · {res.h}-{res.a}</span> : <span>🔒 {count}/{PLAYERS.length}</span>}</div>
                </div>
              );
            };
            return (
              <div style={S.koScroll}><div style={S.koTree}>
                {bracket.map(({ round, games }, ri) => (
                  <div key={round} style={S.koTreeCol}>
                    <div style={{ ...S.bracketRoundLabel, fontSize: 12 }}>{round}</div>
                    <div style={S.koTreeGames}>{games.map((m) => (<div key={m.id} style={S.koTreePair}>{Card(m, round === "Final")}{ri < bracket.length - 1 && <span style={S.connOut} />}{ri > 0 && <span style={S.connIn} />}</div>))}</div>
                  </div>
                ))}
                {realChampion && <div style={S.koTreeCol}><div style={{ ...S.bracketRoundLabel, fontSize: 12 }}>Campeón</div><div style={S.koTreeGames}><div style={S.koTreePair}><div style={S.koChampBox}><div className="pm-trophy" style={{ fontSize: 32 }}>🏆</div><div style={{ fontSize: 30, marginTop: 4 }}>{flag(realChampion)}</div><div className="pm-shine" style={{ fontFamily: "'Anton',sans-serif", fontSize: 18 }}>{realChampion}</div></div><span style={S.connIn} /></div></div></div>}
              </div></div>
            );
          })()}
        </div>
      )}

      {tab === "tabla" && (
        <div className="pm-rise">
          <p style={S.hint}>Posiciones en vivo. 🎯 rey del exacto · 🔥 racha activa · ⚡ mejor racha · 🏆 acertó el campeón.</p>
          {standings.map((row, i) => {
            const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : null;
            return (
              <div key={row.name} className={"pm-card" + (i === 0 ? " pm-leader" : "")} style={{ ...S.standRow, ...(row.name === me ? { borderColor: "#ffcd00" } : {}), ...(i === 0 ? { background: "linear-gradient(100deg,#0a1a3a,#0e1a33)", borderColor: "#06348c" } : {}) }}>
                <div style={{ ...S.rank, ...(i === 0 ? { background: "#ffcd00", color: "#1a1207", boxShadow: "0 0 16px rgba(212,160,23,.5)" } : {}) }}>{medal || i + 1}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 700, fontSize: 18 }}>{row.name}{row.name === me && <span style={{ fontSize: 11, color: "#ffcd00", marginLeft: 8 }}>tú</span>}</div>
                  {row.badges.length > 0 && <div style={S.badgeRow}>{row.badges.map((b, j) => <span key={j} title={b.t} style={S.badgeChip}>{b.e} {b.t}</span>)}</div>}
                </div>
                <div style={S.statMini}>{row.exact} exactos</div>
                <div style={S.statMini}>{row.hits} aciertos</div>
                <div style={S.pts}>{row.pts}<span style={{ fontSize: 11, opacity: .5 }}> pts</span></div>
              </div>
            );
          })}
        </div>
      )}

      {me === ADMIN && <button onClick={() => setAdminOpen(!adminOpen)} style={S.adminToggle}>{adminOpen ? "× Cerrar admin" : "⚙ Admin · resultados y partidos"}</button>}

      {adminOpen && me === ADMIN && (
        <div style={S.adminPanel} className="pm-rise">
          <h3 style={S.adminH}>Cargar resultados oficiales</h3>
          {matches.map((m) => {
            const res = results[m.id] || {};
            return (
              <div key={m.id} style={S.adminRow}>
                <span style={{ flex: 1, fontSize: 13 }}>{flag(m.home)} {m.home} vs {m.away} {flag(m.away)}</span>
                <input className="pm-inp" type="number" min="0" value={res.h ?? ""} onChange={(e) => setResult(m.id, "h", e.target.value)} style={S.adminInp} />
                <span style={{ opacity: .5 }}>:</span>
                <input className="pm-inp" type="number" min="0" value={res.a ?? ""} onChange={(e) => setResult(m.id, "a", e.target.value)} style={S.adminInp} />
                {isKO(m.group) && <button onClick={() => delMatch(m.id)} style={S.delBtn}>borrar</button>}
              </div>
            );
          })}
          <h3 style={{ ...S.adminH, marginTop: 24 }}>Definir campeón oficial</h3>
          <select value={realChampion} onChange={(e) => saveRealChampion(e.target.value)} style={{ ...S.adminText, minWidth: 200 }}>
            <option value="">— Sin definir —</option>
            {[...new Set(CHAMPION_PICKS)].map((c) => <option key={c} value={c}>{flag(c)} {c}</option>)}
          </select>
          <h3 style={{ ...S.adminH, marginTop: 24 }}>Agregar partido (eliminatorias)</h3>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
            <input placeholder="Fase (Octavos, Cuartos, Final…)" value={newM.group} onChange={(e) => setNewM({ ...newM, group: e.target.value })} style={S.adminText} />
            <input placeholder="Local" value={newM.home} onChange={(e) => setNewM({ ...newM, home: e.target.value })} style={S.adminText} />
            <input placeholder="Visitante" value={newM.away} onChange={(e) => setNewM({ ...newM, away: e.target.value })} style={S.adminText} />
            <input placeholder="Fecha (ej. Sáb 4 Jul · 4:00 PM)" value={newM.date} onChange={(e) => setNewM({ ...newM, date: e.target.value })} style={{ ...S.adminText, width: 200 }} />
            <button onClick={addMatch} style={S.addBtn}>+ Agregar</button>
          </div>
        </div>
      )}
    </div>
  );
}

const S = {
  wrap: { fontFamily: "'Archivo', sans-serif", background: "radial-gradient(130% 90% at 0% 0%, #0a1430 0%, #0a1428 45%, #070d1e 100%)", backgroundAttachment: "fixed", color: "#eef4ff", minHeight: "100vh", padding: "32px clamp(16px,5vw,56px)", maxWidth: 1000, margin: "0 auto" },
  header: { display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 16, marginBottom: 20 },
  kicker: { fontSize: 12, letterSpacing: 3, color: "#ffcd00", fontWeight: 700 },
  title: { fontFamily: "'Anton', sans-serif", fontSize: "clamp(40px,8vw,72px)", margin: "4px 0 0", lineHeight: .9, letterSpacing: 1 },
  meBox: { display: "flex", flexDirection: "column", gap: 4 },
  select: { background: "#16264a", color: "#eef4ff", border: "1px solid #27396b", borderRadius: 8, padding: "8px 12px", fontSize: 16, fontFamily: "inherit", fontWeight: 700 },
  errBar: { background: "#5a1a1a", color: "#ffd9d9", border: "1px solid #8a3a3a", borderRadius: 10, padding: "10px 14px", fontSize: 13, marginBottom: 16 },
  nav: { display: "flex", gap: 4, background: "#0e1a33", padding: 4, borderRadius: 12, marginBottom: 24, flexWrap: "wrap" },
  navBtn: { flex: 1, minWidth: 100, background: "transparent", color: "#8ba0c8", border: "none", padding: "12px", borderRadius: 9, fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" },
  navBtnActive: { background: "#ffcd00", color: "#0a1428", boxShadow: "0 4px 14px rgba(212,160,23,.35)" },
  hint: { fontSize: 14, opacity: .7, marginBottom: 20, lineHeight: 1.5 },
  groupLabel: { fontFamily: "'Anton', sans-serif", fontSize: 22, color: "#ffcd00", letterSpacing: 1, marginBottom: 10 },
  dateLabel: { fontFamily: "'Anton',sans-serif", fontSize: 18, color: "#ffcd00", letterSpacing: .5, marginBottom: 10, textTransform: "uppercase" },
  row: { display: "flex", alignItems: "center", gap: 8, background: "#0e1a33", border: "1px solid #1a2a4d", borderRadius: 9, padding: "6px 12px" },
