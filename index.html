function scorePrediction(pred, actual) {
  if (!pred || actual?.h == null || actual?.a == null) return null;
  if (pred.h === actual.h && pred.a === actual.a) return 3;
  const ro = (x) => (x.h > x.a ? 1 : x.h < x.a ? -1 : 0);
  return ro(pred) === ro(actual) ? 1 : 0;
}

// FIFA publica el fixture en hora del Este (ET = EDT = UTC-4 en jun-jul).
const SOURCE_TZ_OFFSET = -4;
const MESES = { Jun: 5, Jul: 6, Ene: 0, Feb: 1, Mar: 2, Abr: 3, May: 4, Ago: 7, Sep: 8, Oct: 9, Nov: 10, Dic: 11 };
function matchTimestamp(dateStr) {
  if (!dateStr) return null;
  const m = dateStr.match(/(\d{1,2})\s+(\w{3}).*?·\s*(\d{1,2}):(\d{2})\s*(AM|PM)/i);
  if (!m) return null;
  const day = +m[1], mon = MESES[m[2].charAt(0).toUpperCase() + m[2].slice(1, 3).toLowerCase()];
  if (mon == null) return null;
  let hr = +m[3]; const min = +m[4]; const pm = /pm/i.test(m[5]);
  if (pm && hr !== 12) hr += 12; if (!pm && hr === 12) hr = 0;
  return Date.UTC(2026, mon, day, hr - SOURCE_TZ_OFFSET, min);
}

// avanza su GANADOR, y a dónde va el PERDEDOR (solo para semis → tercer puesto).
// Basado en la estructura oficial FIFA 2026 definida en KO_MATCHES.
const ADVANCE = {
  // Dieciseisavos → Octavos (conexiones oficiales FIFA)
  m74: { win: ["m89", "home"] }, m77: { win: ["m89", "away"] },
  m73: { win: ["m90", "home"] }, m75: { win: ["m90", "away"] },
  m76: { win: ["m91", "home"] }, m78: { win: ["m91", "away"] },
  m79: { win: ["m92", "home"] }, m80: { win: ["m92", "away"] },
  m83: { win: ["m93", "home"] }, m84: { win: ["m93", "away"] },
  m81: { win: ["m94", "home"] }, m82: { win: ["m94", "away"] },
  m86: { win: ["m95", "home"] }, m88: { win: ["m95", "away"] },
  m85: { win: ["m96", "home"] }, m87: { win: ["m96", "away"] },
  // Octavos → Cuartos
  m89: { win: ["m97", "home"] }, m90: { win: ["m97", "away"] },
  m93: { win: ["m98", "home"] }, m94: { win: ["m98", "away"] },
  m91: { win: ["m99", "home"] }, m92: { win: ["m99", "away"] },
  m95: { win: ["m100", "home"] }, m96: { win: ["m100", "away"] },
  // Cuartos → Semis
  m97: { win: ["m101", "home"] }, m98: { win: ["m101", "away"] },
  m99: { win: ["m102", "home"] }, m100: { win: ["m102", "away"] },
  // Semis → Final (ganador) y Tercer puesto (perdedor)
  m101: { win: ["m104", "home"], lose: ["m103", "home"] },
  m102: { win: ["m104", "away"], lose: ["m103", "away"] },
};

function PollaMundial() {
  const [players, setPlayers] = useState(DEFAULT_PLAYERS);
  const PLAYERS = players; // alias para usar igual que antes en todo el componente
  const [matches, setMatches] = useState(ALL_SEED);
  const [predictions, setPredictions] = useState({});
  const [results, setResults] = useState({});
  const [champions, setChampions] = useState({});
  const [realChampion, setRealChampion] = useState("");
  const [me, setMe] = useState(() => {
    try { return localStorage.getItem("polla_me") || ""; } catch { return ""; }
  });
  const [pinInput, setPinInput] = useState("");
  const [pinError, setPinError] = useState(false);
  const [askingPin, setAskingPin] = useState(false);
  const [tab, setTab] = useState("grupos");
  const [loading, setLoading] = useState(true);
  const [adminOpen, setAdminOpen] = useState(false);
  const [newM, setNewM] = useState({ group: "Octavos", home: "", away: "", date: "" });
  const [newPlayer, setNewPlayer] = useState("");
  const [adminEdit, setAdminEdit] = useState({ player: "", matchId: "", h: "", a: "" });
  const [now, setNow] = useState(Date.now());
  const [confetti, setConfetti] = useState(false);
  const [saveErr, setSaveErr] = useState(false);
  const [draft, setDraft] = useState({});      // borrador local mientras escribe: { matchId: {h,a} }
  const [editing, setEditing] = useState({});   // partidos en modo edición: { matchId: true }
  const [justSaved, setJustSaved] = useState({}); // flash "✓ Guardado!" momentáneo: { matchId: true }
  const [savingMatch, setSavingMatch] = useState({}); // "Guardando…" mientras confirma: { matchId: true }
  const [expanded, setExpanded] = useState({});    // partidos con apuestas desplegadas: { matchId: true }

  useEffect(() => { const t = setInterval(() => setNow(Date.now()), 15000); return () => clearInterval(t); }, []);

  // Refs que SIEMPRE tienen el último valor (React actualiza el estado async,
  // así que para guardar usamos estos refs, no las variables de estado).
  const predRef = useRef({}); predRef.current = predictions;
  const resRef = useRef({}); resRef.current = results;
  const champRef = useRef({}); champRef.current = champions;
  const realChampRef = useRef(""); realChampRef.current = realChampion;
  const matchesRef = useRef(ALL_SEED); matchesRef.current = matches;
  const playersRef = useRef(DEFAULT_PLAYERS); playersRef.current = players;
  const lastPushRef = useRef(0);
  const savingRef = useRef(false);
  const dirtyRef = useRef(false);
  const [saving, setSaving] = useState(false);

  // Limpia un valor de marcador: entero entre 0 y 99, o null.
  const cleanScore = (v) => (v == null || v === "" || isNaN(v)) ? null : Math.min(99, Math.max(0, Math.floor(+v)));
  // Migración: las eliminatorias cambiaron de IDs (d**, o*, c*, s*, tp, fin) a la
  // numeración oficial FIFA (m73-m104). Reconectamos apuestas/resultados viejos por equipos.
  const KO_ID_MIGRATION = {
    d73: "m73", d74: "m76", d75: "m74", d76: "m75", d77: "m78", d78: "m77",
    d79: "m79", d80: "m80", d81: "m81", d82: "m82", d83: "m84", d84: "m83",
    d85: "m85", d86: "m88", d87: "m86", d88: "m87",
  };
  const migrateIds = (obj) => {
    if (!obj) return obj;
    const out = {};
    for (const id of Object.keys(obj)) {
      const newId = KO_ID_MIGRATION[id] || id;
      // Si ya existe data en el id nuevo, fusionar sin pisar lo nuevo
      if (out[newId]) {
        if (typeof obj[id] === "object" && !("h" in obj[id])) {
          // predicciones: objeto de jugadores
          out[newId] = { ...obj[id], ...out[newId] };
        }
      } else {
        out[newId] = obj[id];
      }
    }
    return out;
  };

  const cleanPreds = (preds) => {
    const out = {};
    const src = migrateIds(preds);
    for (const mId of Object.keys(src || {})) {
      out[mId] = {};
      for (const pl of Object.keys(src[mId] || {})) {
        const x = src[mId][pl] || {};
        out[mId][pl] = { h: cleanScore(x.h), a: cleanScore(x.a) };
      }
    }
    return out;
  };
  const cleanResults = (rs) => {
    const out = {};
    const src = migrateIds(rs);
    for (const mId of Object.keys(src || {})) {
      const x = src[mId] || {};
      out[mId] = { h: cleanScore(x.h), a: cleanScore(x.a) };
    }
    return out;
  };

  const applyState = (st, fromPoll) => {
    if (!st) return;
    let incoming = cleanPreds(st.predictions);
    if (fromPoll) {
      // El polling no debe borrar MIS apuestas recientes: si yo tengo una apuesta
      // en el ref local que el servidor todavía no refleja, la conservo.
      const mineLocal = predRef.current || {};
      const merged = { ...incoming };
      for (const mId of Object.keys(mineLocal)) {
        const myBet = mineLocal[mId]?.[me];
        if (myBet && myBet.h != null && myBet.a != null) {
          const serverBet = incoming[mId]?.[me];
          // Si el servidor no tiene mi apuesta para ese partido, la mantengo.
          if (!serverBet || serverBet.h == null || serverBet.a == null) {
            merged[mId] = { ...(incoming[mId] || {}), [me]: myBet };
          }
        }
      }
      incoming = merged;
    }
    predRef.current = incoming;
    setPredictions(incoming);
    setResults(cleanResults(st.results));
    setChampions(st.champions || {});
    setRealChampion(st.real_champion || "");
    if (Array.isArray(st.players) && st.players.length) setPlayers(st.players);
  };

  // ── Carga inicial ──
  useEffect(() => {
    let active = true;
    (async () => {
      try {
        const { state, matches: mt } = await apiGet();
        if (!active) return;
        applyState(state);
        if (mt) setMatches(mt);
      } catch (e) { console.error(e); setSaveErr(true); }
      setLoading(false);
    })();
    return () => { active = false; };
  }, []);

  // ── Guardado en cola: junta cambios y nunca pierde el último ──
  // Cada cambio marca "dirty" y dispara un flush. Si ya hay un guardado en curso,
  // se vuelve a guardar al terminar, usando SIEMPRE el estado más reciente (los refs).
  const flush = async () => {
    if (savingRef.current) { dirtyRef.current = true; return; }
    savingRef.current = true; dirtyRef.current = false;
    setSaving(true);
    lastPushRef.current = Date.now();
    const payload = {
      state: {
        predictions: predRef.current,
        results: resRef.current,
        champions: champRef.current,
        real_champion: realChampRef.current,
        players: playersRef.current,
      },
      matches: matchesRef.current,
    };
    try { await apiPost(payload); setSaveErr(false); }
    catch (e) { console.error(e); setSaveErr(true); dirtyRef.current = true; }
    savingRef.current = false;
    lastPushRef.current = Date.now();
    if (dirtyRef.current) { setTimeout(flush, 200); } // hubo más cambios mientras guardaba
    else setSaving(false);
  };
  const queueSave = () => { dirtyRef.current = true; setTimeout(flush, 150); };

  // ── Polling: trae cambios de otros, pero NUNCA mientras yo estoy editando/guardando ──
  useEffect(() => {
    const t = setInterval(async () => {
      if (savingRef.current || dirtyRef.current) return;        // estoy guardando
      if (Date.now() - lastPushRef.current < 8000) return;      // acabo de guardar, espera
      try {
        const { state, matches: mt } = await apiGet();
        applyState(state, true);
        if (mt) setMatches(mt);
        setSaveErr(false);
      } catch (e) { /* reintenta luego */ }
    }, 6000);
    return () => clearInterval(t);
  }, []);

  // Escribir en el borrador local (no guarda todavía)
  const setDraftScore = (matchId, side, val) => {
    const v = val === "" ? null : Math.min(99, Math.max(0, parseInt(val) || 0));
    const base = draft[matchId] || predictions[matchId]?.[me] || {};
    setDraft({ ...draft, [matchId]: { ...base, [side]: v } });
  };
  // Guardar la predicción de un partido (botón Guardar) — CONFIRMADO con el servidor
  const savePred = async (matchId) => {
    const m = matches.find((x) => x.id === matchId);
    // Doble verificación: si el partido ya empezó justo ahora, no deja guardar
    if (m && hasStarted(m, true)) { setNow(Date.now()); return; }
    const d = draft[matchId] || predictions[matchId]?.[me] || {};
    if (d.h == null || d.a == null) return; // necesita ambos marcadores
    const next = { ...predictions, [matchId]: { ...(predictions[matchId] || {}), [me]: { h: d.h, a: d.a } } };
    predRef.current = next; setPredictions(next);

    // Guardado directo y confirmado: solo marca "guardado" si el servidor responde OK
    setSavingMatch((s) => ({ ...s, [matchId]: true }));
    savingRef.current = true;        // bloquea el polling mientras envío
    lastPushRef.current = Date.now();
    try {
      await apiPost({
        state: {
          predictions: predRef.current, results: resRef.current,
          champions: champRef.current, real_champion: realChampRef.current,
          players: playersRef.current,
        },
      });
      lastPushRef.current = Date.now();
      setSaveErr(false);
      // Éxito confirmado: ahora sí limpiamos borrador, salimos de edición y mostramos ✓
      const nd = { ...draft }; delete nd[matchId]; setDraft(nd);
      const ne = { ...editing }; delete ne[matchId]; setEditing(ne);
      setJustSaved((js) => ({ ...js, [matchId]: true }));
      setTimeout(() => setJustSaved((js) => { const n = { ...js }; delete n[matchId]; return n; }), 1400);
    } catch (e) {
      console.error(e);
      setSaveErr(true);
      alert("⚠️ No se pudo guardar tu apuesta. Revisa tu conexión y vuelve a darle Guardar.");
      // NO limpiamos el borrador ni salimos de edición: el botón Guardar sigue ahí para reintentar
    }
    savingRef.current = false;
    lastPushRef.current = Date.now();
    setSavingMatch((s) => { const n = { ...s }; delete n[matchId]; return n; });
  };
  // Guardado directo (usado en el bracket de eliminatorias)
  const setPred = (matchId, side, val) => {
    const v = val === "" ? null : Math.min(99, Math.max(0, parseInt(val) || 0));
    const cur = predictions[matchId]?.[me] || {};
    const next = { ...predictions, [matchId]: { ...(predictions[matchId] || {}), [me]: { ...cur, [side]: v } } };
    predRef.current = next; setPredictions(next); queueSave();
  };
  // Entrar en modo edición (botón Editar)
  const editPred = (matchId) => {
    setDraft({ ...draft, [matchId]: { ...(predictions[matchId]?.[me] || {}) } });
    setEditing({ ...editing, [matchId]: true });
  };
  const setResult = (matchId, side, val) => {
    const v = val === "" ? null : Math.min(99, Math.max(0, parseInt(val) || 0));
    const cur = results[matchId] || {};
    const newRes = { ...cur, [side]: v };
    let next = { ...results, [matchId]: newRes };
    resRef.current = next; setResults(next);

    // Auto-avance del bracket: si es un partido KO con ambos marcadores y ganador claro,
    // poner el ganador (y perdedor en semis) en la siguiente ronda.
    const m = matches.find((x) => x.id === matchId);
    if (m && isKO(m.group) && ADVANCE[matchId] && newRes.h != null && newRes.a != null && newRes.h !== newRes.a) {
      const homeT = resolveSlot(m.home), awayT = resolveSlot(m.away);
      const winner = newRes.h > newRes.a ? homeT : awayT;
      const loser = newRes.h > newRes.a ? awayT : homeT;
      const adv = ADVANCE[matchId];
      let nextMatches = matches;
      if (adv.win) nextMatches = nextMatches.map((x) => x.id === adv.win[0] ? { ...x, [adv.win[1]]: winner } : x);
      if (adv.lose) nextMatches = nextMatches.map((x) => x.id === adv.lose[0] ? { ...x, [adv.lose[1]]: loser } : x);
      matchesRef.current = nextMatches; setMatches(nextMatches);
    }
    queueSave();
  };
  // Avanzar manualmente al ganador (cuando el partido KO quedó empatado y se definió por penaltis).
  const advanceWinner = (matchId, winner) => {
    const adv = ADVANCE[matchId];
    if (!adv) return;
    const m = matches.find((x) => x.id === matchId);
    const homeT = resolveSlot(m.home), awayT = resolveSlot(m.away);
    const loser = winner === homeT ? awayT : homeT;
    let nextMatches = matches;
    if (adv.win) nextMatches = nextMatches.map((x) => x.id === adv.win[0] ? { ...x, [adv.win[1]]: winner } : x);
    if (adv.lose) nextMatches = nextMatches.map((x) => x.id === adv.lose[0] ? { ...x, [adv.lose[1]]: loser } : x);
    matchesRef.current = nextMatches; setMatches(nextMatches); queueSave();
    alert(`✓ ${winner} avanza a la siguiente ronda.`);
  };
  const saveChampions = (c) => {
    if (Date.now() >= CHAMPION_DEADLINE || realChampion) return; // cerrado: no se puede cambiar
    champRef.current = c; setChampions(c); queueSave();
  };
  const saveRealChampion = (v) => { realChampRef.current = v; setRealChampion(v); queueSave(); };
  const saveMatches = (m) => { matchesRef.current = m; setMatches(m); queueSave(); };
  // Resincroniza el fixture (fechas/horas) desde el código, conservando
  // cualquier partido extra de eliminatorias que el admin haya agregado.
  // No toca apuestas, resultados ni jugadores.
  // Admin: guardar/corregir la apuesta de cualquier jugador en cualquier partido,
  // incluso si ya empezó. Para casos como "se le olvidó guardar".
  const adminSavePrediction = () => {
    const { player, matchId, h, a } = adminEdit;
    if (!player || !matchId || h === "" || a === "") { alert("Elige jugador, partido y escribe el marcador."); return; }
    const hh = cleanScore(h), aa = cleanScore(a);
    const next = { ...predictions, [matchId]: { ...(predictions[matchId] || {}), [player]: { h: hh, a: aa } } };
    predRef.current = next; setPredictions(next); queueSave();
    const m = matches.find((x) => x.id === matchId);
    const nombre = m ? `${m.home} vs ${m.away}` : matchId;
    alert(`✓ Apuesta de ${player} guardada: ${hh}-${aa} en ${nombre}`);
    setAdminEdit({ player: "", matchId: "", h: "", a: "" });
  };

  const resyncFixture = async () => {
    if (!confirm("Esto actualizará las fechas y horas de los partidos a las del código (corrige las horas). No borra apuestas ni resultados. ¿Continuar?")) return;
    const seedIds = new Set(ALL_SEED.map((m) => m.id));
    const extras = matches.filter((m) => !seedIds.has(m.id)); // eliminatorias agregadas a mano
    const next = [...ALL_SEED, ...extras];
    matchesRef.current = next; setMatches(next);
    setSaving(true);
    lastPushRef.current = Date.now();
    try {
      await apiPost({ matches: next });
      lastPushRef.current = Date.now();
      setSaveErr(false);
      alert("✓ Fixture actualizado. Las horas ya quedaron corregidas para todos.");
    } catch (e) {
      console.error(e); setSaveErr(true);
      alert("⚠️ No se pudo guardar. Revisa tu conexión e intenta de nuevo.");
    }
    setSaving(false);
  };
  // Guardado directo de la lista de jugadores (acción del admin).
  // Manda la marca playersEdit para que el servidor sí actualice la lista.
  const pushPlayers = async (list) => {
    lastPushRef.current = Date.now();
    setSaving(true);
    try {
      await apiPost({
        playersEdit: true,
        state: {
          predictions: predRef.current, results: resRef.current,
          champions: champRef.current, real_champion: realChampRef.current,
          players: list,
        },
      });
      setSaveErr(false);
    } catch (e) { console.error(e); setSaveErr(true); }
    lastPushRef.current = Date.now();
    setSaving(false);
  };
  const addPlayer = (name) => {
    const n = (name || "").trim();
    if (!n || players.includes(n)) return;
    const next = [...players, n];
    playersRef.current = next; setPlayers(next); pushPlayers(next);
  };
  const removePlayer = (name) => {
    if (name === ADMIN) return; // no se puede quitar al admin
    const next = players.filter((p) => p !== name);
    playersRef.current = next; setPlayers(next); pushPlayers(next);
  };

  const standings = useMemo(() => {
    const totals = Object.fromEntries(PLAYERS.map((p) => [p, { pts: 0, exact: 0, hits: 0, champ: false, streak: 0, bestStreak: 0 }]));
    const closedOrdered = matches
      .filter((m) => { const r = results[m.id]; return r && r.h != null && r.a != null; })
      .sort((a, b) => (matchTimestamp(a.date) || 0) - (matchTimestamp(b.date) || 0));
    PLAYERS.forEach((p) => {
      let run = 0;
      closedOrdered.forEach((m) => {
        const s = scorePrediction(predictions[m.id]?.[p], results[m.id]);
        if (s != null) {
          totals[p].pts += s;
          if (s === 3) totals[p].exact++;
          if (s > 0) { totals[p].hits++; run++; if (run > totals[p].bestStreak) totals[p].bestStreak = run; }
          else run = 0;
        }
      });
      totals[p].streak = run;
    });
    if (realChampion) PLAYERS.forEach((p) => { if (champions[p] === realChampion) { totals[p].pts += CHAMPION_PTS; totals[p].champ = true; } });
    const arr = Object.entries(totals).map(([n, v]) => ({ name: n, ...v }));
    const maxExact = Math.max(0, ...arr.map((r) => r.exact));
    const maxStreak = Math.max(0, ...arr.map((r) => r.bestStreak));
    arr.forEach((r) => {
      r.badges = [];
      if (maxExact > 0 && r.exact === maxExact) r.badges.push({ e: "🎯", t: "Rey del marcador exacto" });
      if (r.streak >= 3) r.badges.push({ e: "🔥", t: `Racha de ${r.streak}` });
      if (maxStreak >= 3 && r.bestStreak === maxStreak) r.badges.push({ e: "⚡", t: `Mejor racha (${r.bestStreak})` });
      if (r.champ) r.badges.push({ e: "🏆", t: "Acertó el campeón" });
    });
    return arr.sort((a, b) => b.pts - a.pts || b.exact - a.exact || b.hits - a.hits);
  }, [matches, predictions, results, champions, realChampion]);

  // Tabla REAL del Mundial por grupo: calcula posición de cada equipo a partir
  // de los resultados oficiales que carga el admin. 3 pts victoria, 1 empate, 0 derrota.
  const groupTables = useMemo(() => {
    const out = {};
    matches.forEach((m) => {
      if (isKO(m.group)) return;
      if (!out[m.group]) out[m.group] = {};
      // asegurar que ambos equipos existan en la tabla del grupo
      [m.home, m.away].forEach((t) => {
        if (!out[m.group][t]) out[m.group][t] = { team: t, pj: 0, g: 0, e: 0, p: 0, gf: 0, gc: 0, pts: 0 };
      });
      const r = results[m.id];
      if (!r || r.h == null || r.a == null) return; // sin resultado aún
      const H = out[m.group][m.home], A = out[m.group][m.away];
      H.pj++; A.pj++;
      H.gf += r.h; H.gc += r.a; A.gf += r.a; A.gc += r.h;
      if (r.h > r.a) { H.g++; H.pts += 3; A.p++; }
      else if (r.h < r.a) { A.g++; A.pts += 3; H.p++; }
      else { H.e++; A.e++; H.pts++; A.pts++; }
    });
    // ordenar cada grupo: puntos, luego diferencia de gol, luego goles a favor
    const ranked = {};
    Object.keys(out).forEach((grp) => {
      ranked[grp] = Object.values(out[grp]).sort((a, b) =>
        b.pts - a.pts || (b.gf - b.gc) - (a.gf - a.gc) || b.gf - a.gf || a.team.localeCompare(b.team)
      );
    });
    return ranked;
  }, [matches, results]);

  // Resuelve un slot de eliminatoria (ej. "1ºA", "2ºF") al equipo real,
  // SOLO si ese grupo ya jugó todos sus partidos. Si no, devuelve el slot tal cual.
  const resolveSlot = useMemo(() => {
    // contar partidos jugados vs totales por grupo
    const totalByGroup = {}, playedByGroup = {};
    matches.forEach((m) => {
      if (isKO(m.group)) return;
      totalByGroup[m.group] = (totalByGroup[m.group] || 0) + 1;
      const r = results[m.id];
      if (r && r.h != null && r.a != null) playedByGroup[m.group] = (playedByGroup[m.group] || 0) + 1;
    });
    return (slot) => {
      // slot tipo "1ºA" o "2ºF": posición + letra de grupo
      const m = (slot || "").match(/^([12])º([A-L])$/);
      if (!m) return slot; // no es un slot de 1º/2º (ej. tercero o "Gana O1") → dejar igual
      const pos = +m[1], grp = m[2];
      // solo resolver si el grupo terminó del todo
      if (!totalByGroup[grp] || playedByGroup[grp] !== totalByGroup[grp]) return slot;
      const table = groupTables[grp];
      if (!table || !table[pos - 1]) return slot;
      return table[pos - 1].team; // 1º = índice 0, 2º = índice 1
    };
  }, [matches, results, groupTables]);

  const prevExactRef = useRef(null);
  const exactReadyRef = useRef(false);
  useEffect(() => {
    // No vigilar hasta que la carga inicial termine (evita confeti al abrir la app).
    if (loading) return;
    const mine = standings.find((r) => r.name === me);
    const cur = mine ? mine.exact : 0;
    if (!exactReadyRef.current) {
      // Primera medición estable tras cargar: solo registramos el valor base, sin confeti.
      prevExactRef.current = cur;
      exactReadyRef.current = true;
      return;
    }
    if (cur > prevExactRef.current) {
      setConfetti(true);
      const t = setTimeout(() => setConfetti(false), 3500);
      prevExactRef.current = cur;
      return () => clearTimeout(t);
    }
    prevExactRef.current = cur;
  }, [standings, me, loading]);

  // Si cambio de identidad (me), reiniciar la base para no disparar confeti por el cambio.
  useEffect(() => { exactReadyRef.current = false; }, [me]);

  const grouped = useMemo(() => { const g = {}; matches.forEach((m) => { (g[m.group] ||= []).push(m); }); return g; }, [matches]);
  const bracket = useMemo(() => {
    const byRound = {};
    matches.forEach((m) => { if (isKO(m.group)) (byRound[m.group] ||= []).push(m); });
    return KO_ROUNDS.filter((r) => byRound[r] && byRound[r].length).map((r) => ({ round: r, games: byRound[r] }));
  }, [matches]);

  const flag = (t) => FLAGS[t] || "⚽";

  // Elegir identidad. Si es Manuel (admin), abre el PIN. Los demás entran directo.
  const pickIdentity = (name) => {
    if (name === ADMIN) { setAskingPin(true); setPinInput(""); setPinError(false); return; }
    try { localStorage.setItem("polla_me", name); } catch {}
    setMe(name);
  };
  const submitPin = () => {
    if (pinInput !== ADMIN_PIN) { setPinError(true); return; }
    try { localStorage.setItem("polla_me", ADMIN); } catch {}
    setMe(ADMIN); setAskingPin(false); setPinError(false); setPinInput("");
  };
  const logout = () => {
    try { localStorage.removeItem("polla_me"); } catch {}
    setMe(""); setAdminOpen(false); setPinInput(""); setPinError(false); setAskingPin(false);
  };
  const isClosed = (mId) => { const r = results[mId]; return r && r.h != null && r.a != null; };
  const hasStarted = (m, realtime) => { const ts = matchTimestamp(m.date); return ts != null && (realtime ? Date.now() : now) >= ts; };
  const isLocked = (m) => isClosed(m.id) || hasStarted(m);
  const betCount = (mId) => PLAYERS.filter((p) => { const x = predictions[mId]?.[p]; return x && x.h != null && x.a != null; }).length;

  const addMatch = () => {
    if (!newM.home || !newM.away) return;
    saveMatches([...matches, { id: "k" + Date.now(), ...newM }]);
    setNewM({ group: newM.group, home: "", away: "", date: "" });
  };
  const delMatch = (id) => saveMatches(matches.filter((m) => m.id !== id));
  // Editar el nombre del equipo (home/away) de un cruce de eliminatoria.
  // Sirve para poner los terceros reales o el ganador que avanza.
  const setKOTeam = (matchId, side, name) => {
    const next = matches.map((m) => m.id === matchId ? { ...m, [side]: name } : m);
    saveMatches(next);
  };

  if (loading) return <div style={{ ...S.wrap, display: "flex", alignItems: "center", justifyContent: "center", minHeight: "60vh", color: "#ffcd00" }}>Cargando la polla…</div>;

  if (!me) {
    const initial = (n) => n.charAt(0);
    const avatarColors = { Nicole: "#ff5c8a", Manuel: "#ffcd00", Daniela: "#22c55e", Ernesto: "#308ff6", Aura: "#b15cff", Carolina: "#ff8c42", Daniel: "#00d4c8" };
    return (
      <div style={S.gateScreen}>
        <div style={S.gateGlow} />
        <div style={S.gateInner} className="pm-rise">
          <svg viewBox="0 0 120 150" width="74" height="92" className="pm-trophy" style={{ filter: "drop-shadow(0 10px 24px rgba(255,205,0,.4))" }}>
            <defs><linearGradient id="gc" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#ffe65c"/><stop offset="50%" stopColor="#ffcd00"/><stop offset="100%" stopColor="#b38f00"/></linearGradient></defs>
            <path d="M35 20 H85 V42 Q85 70 60 78 Q35 70 35 42 Z" fill="url(#gc)" stroke="#806600" strokeWidth="1.5"/>
            <path d="M35 26 Q18 28 20 44 Q22 56 35 54" fill="none" stroke="url(#gc)" strokeWidth="5"/>
            <path d="M85 26 Q102 28 100 44 Q98 56 85 54" fill="none" stroke="url(#gc)" strokeWidth="5"/>
            <rect x="55" y="78" width="10" height="16" fill="url(#gc)"/>
            <path d="M44 94 H76 L72 104 H48 Z" fill="url(#gc)" stroke="#806600" strokeWidth="1"/>
            <rect x="42" y="104" width="36" height="8" rx="2" fill="#b38f00"/>
            <rect x="38" y="112" width="44" height="9" rx="2" fill="url(#gc)" stroke="#806600" strokeWidth="1"/>
          </svg>
          <div style={S.gateKicker}>POLLA MUNDIALISTA · 2026</div>
          <h1 style={{ ...S.title, fontSize: "clamp(34px,9vw,56px)", textAlign: "center", margin: "2px 0 0" }}>FAMILIA AVILA<span className="pm-shine">.</span></h1>

          {!askingPin ? (
            <>
              <p style={S.gateAsk}>¿Quién eres?</p>
              <div style={S.gateGrid}>
                {PLAYERS.map((p) => (
                  <button key={p} onClick={() => pickIdentity(p)} className="pm-card gate-btn" style={S.gateBtn}>
                    <span style={{ ...S.gateAvatar, background: avatarColors[p] || "#ffcd00" }}>{initial(p)}</span>
                    <span style={{ fontWeight: 700, fontSize: 15 }}>{p}</span>
                    {p === ADMIN && <span style={S.gateLock}>🔒 admin</span>}
                  </button>
                ))}
              </div>
            </>
          ) : (
            <div style={S.pinPanel} className="pm-rise">
              <span style={{ ...S.gateAvatar, background: "#ffcd00", width: 56, height: 56, fontSize: 24 }}>M</span>
              <div style={{ fontWeight: 700, fontSize: 18, marginTop: 10 }}>Hola Manuel 👋</div>
              <div style={{ fontSize: 13, opacity: .7, marginBottom: 14 }}>Escribe tu PIN de admin para entrar</div>
              <input autoFocus type="password" inputMode="numeric" value={pinInput}
                onChange={(e) => { setPinInput(e.target.value); setPinError(false); }}
                onKeyDown={(e) => e.key === "Enter" && submitPin()}
                placeholder="• • • •" style={{ ...S.gatePinInp, ...(pinError ? { borderColor: "#ec5a5a", animation: "shake .3s" } : {}) }} />
              {pinError && <span style={{ fontSize: 12, color: "#ec5a5a", fontWeight: 700, marginTop: 8 }}>PIN incorrecto, intenta de nuevo</span>}
              <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
                <button onClick={() => { setAskingPin(false); setPinError(false); setPinInput(""); }} style={S.pinBack}>← Volver</button>
                <button onClick={submitPin} style={S.pinEnter}>Entrar</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  return (
    <div style={S.wrap}>
      {confetti && (
        <div className="pm-confetti">
          {Array.from({ length: 80 }).map((_, i) => {
            const colors = ["#ffcd00", "#ffe65c", "#01bf50", "#308ff6", "#ec0000", "#ffffff"];
            return <i key={i} style={{ left: `${Math.random() * 100}%`, background: colors[i % colors.length], animationDuration: `${1.8 + Math.random() * 1.6}s`, animationDelay: `${Math.random() * 0.5}s` }} />;
          })}
        </div>
      )}

      <header style={S.header}>
        <div>
          <div style={S.kicker}><span className="pm-trophy" style={{ marginRight: 8 }}>🏆</span>POLLA MUNDIALISTA · 2026</div>
          <h1 style={S.title}>FAMILIA AVILA<span className="pm-shine">.</span></h1>
        </div>
        <div style={S.meBox}>
          <span style={{ fontSize: 12, opacity: .6, textTransform: "uppercase", letterSpacing: 1 }}>Soy</span>
          <div style={S.meFixed}>
            <span style={{ fontWeight: 700, fontSize: 16 }}>{me}{me === ADMIN && " ⚙"}</span>

        </div>
      </header>

      {saveErr && <div style={S.errBar}>⚠️ Hubo un problema guardando. Revisa tu conexión. Tus datos podrían no haberse guardado.</div>}

      <nav style={S.nav}>
        {[["grupos", "Grupos"], ["apostar", "Apostar"], ["campeon", "Campeón 🏆"], ["bracket", "Eliminatorias"], ["tabla", "Tabla de posiciones"]].map(([k, l]) => (
          <button key={k} onClick={() => setTab(k)} className="pm-navbtn" style={{ ...S.navBtn, ...(tab === k ? S.navBtnActive : {}) }}>{l}</button>
        ))}
      </nav>

      {tab === "grupos" && (
        <div className="pm-rise">
          <p style={S.hint}>Los <b>12 grupos</b> del Mundial 2026. Pasan los <b>2 primeros</b> de cada grupo más los <b>8 mejores terceros</b>.</p>
          <div style={S.mapGrid}>
            {Object.entries(grouped).filter(([grp]) => !isKO(grp)).map(([grp, ms]) => {
              const teams = [...new Set(ms.flatMap((m) => [m.home, m.away]))];
              const isCol = teams.includes("Colombia");
              const table = groupTables[grp] || [];
              const anyPlayed = table.some((t) => t.pj > 0);
              return (
                <div key={grp} style={{ ...S.mapNode, ...(isCol ? { borderColor: "#ffcd00" } : {}) }}>
                  <div style={S.mapNodeTitle}>Grupo {grp}</div>
                  <div style={S.tableHead}>
                    <span style={{ width: 18 }}></span>
                    <span style={{ flex: 1 }}></span>
                    <span style={S.tableCol}>PJ</span>

                    const clasifica = anyPlayed && i < 2;
                    const dg = t.gf - t.gc;
                    return (
                      <div key={t.team} style={{ ...S.tableRow, ...(clasifica ? S.tableRowQ : {}) }}>
                        <span style={S.tablePos}>{i + 1}</span>
                        <span style={{ ...S.tableTeam, ...(t.team === "Colombia" ? { color: "#ffcd00", fontWeight: 700 } : {}) }}>
                          <span style={{ fontSize: 15 }}>{flag(t.team)}</span>
                          <span style={S.tableTeamName}>{t.team}</span>
                        </span>
                        <span style={S.tableCol}>{t.pj}</span>
                        <span style={S.tableCol}>{dg > 0 ? "+" + dg : dg}</span>
                        <span style={{ ...S.tableCol, width: 26, fontWeight: 700, color: "#ffcd00" }}>{t.pts}</span>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
          <div style={{ ...S.dateLabel, marginTop: 32 }}>¿Cómo funciona el Mundial?</div>
          <div style={S.pathList}>
            {[
              { t: "Fase de grupos", d: "48 → 32", x: "12 grupos de 4. Pasan los 2 primeros + 8 mejores terceros", date: "11–27 jun", emoji: "🌎" },
              { t: "Ronda de 32", d: "32 → 16", x: "Arranca la eliminación directa", date: "28 jun – 3 jul", emoji: "⚔️" },
              { t: "Octavos", d: "16 → 8", x: "Octavos de final", date: "4–7 jul", emoji: "🔥" },
              { t: "Cuartos", d: "8 → 4", x: "Cuartos de final", date: "9–11 jul", emoji: "💪" },
              { t: "Semifinal", d: "4 → 2", x: "Los 4 mejores del mundo", date: "14–15 jul", emoji: "🌟" },
              { t: "Final", d: "2 → 1", x: "El campeón se decide en Nueva York", date: "19 jul", emoji: "🏆" },
            ].map((s) => (
              <div key={s.t} style={S.pathStep}>
                <div style={S.pathNum}>{s.emoji}</div>
                <div style={{ flex: 1 }}><div style={S.pathTitle}>{s.t} <span style={S.pathCount}>{s.d}</span></div><div style={S.pathDesc}>{s.x}</div></div>
                <div style={S.pathDate}>{s.date}</div>
              </div>
            ))}
          </div>

          <div style={{ ...S.dateLabel, marginTop: 32 }}>📋 Reglas de la polla</div>
          <div style={S.rulesGrid}>
            <div style={S.ruleCard}>
              <div style={S.rulePts}>3<span style={S.rulePtsLbl}>pts</span></div>
              <div style={{ flex: 1 }}><div style={S.ruleTitle}>Marcador exacto</div><div style={S.ruleDesc}>Le atinas al resultado completo. Predijiste 2-1 y quedó 2-1.</div></div>
            </div>
            <div style={S.ruleCard}>
              <div style={S.rulePts}>1<span style={S.rulePtsLbl}>pt</span></div>
              <div style={{ flex: 1 }}><div style={S.ruleTitle}>Acertar el resultado</div><div style={S.ruleDesc}>Aciertas quién gana, pierde o si empatan, pero no el marcador. Predijiste 2-1 y quedó 3-0: gana el mismo, +1.</div></div>
            </div>
            <div style={S.ruleCard}>
              <div style={S.rulePts}>0<span style={S.rulePtsLbl}>pts</span></div>
              <div style={{ flex: 1 }}><div style={S.ruleTitle}>Fallaste</div><div style={S.ruleDesc}>Si predijiste que ganaba uno y empató o ganó el otro, no sumas.</div></div>
            </div>
            <div style={{ ...S.ruleCard, borderLeftColor: "#22c55e" }}>
              <div style={{ ...S.rulePts, color: "#22c55e" }}>5<span style={S.rulePtsLbl}>pts</span></div>
              <div style={{ flex: 1 }}><div style={S.ruleTitle}>Campeón del mundo 🏆</div><div style={S.ruleDesc}>Eliges tu campeón en la pestaña Campeón. Si le atinas, +5 al final del torneo.</div></div>
            </div>
          </div>
          <div style={S.rulesNote}>
            🔒 Cada quien apuesta en secreto: las predicciones de los demás se revelan solo cuando arranca el partido. Tu apuesta se cierra sola al pitazo inicial.
          </div>
        </div>
      )}

      {tab === "apostar" && (() => {
        // Fila de apuesta reutilizable (grupos y eliminatorias).
        const BetRow = (m) => {
          const homeT = resolveSlot(m.home), awayT = resolveSlot(m.away);
          const pr = predictions[m.id]?.[me] || {};
          const res = results[m.id] || {};
          const closed = res.h != null && res.a != null;
          const locked = isLocked(m);
          const s = scorePrediction(pr, res);
          const wH = closed && res.h > res.a, wA = closed && res.a > res.h;
          const kick = matchTimestamp(m.date);
          const dd = kick != null ? new Date(kick).toLocaleString("es", { day: "numeric", month: "short" }) : "";
          const hh = kick != null ? new Date(kick).toLocaleString("es", { hour: "numeric", minute: "2-digit" }) : "";
          const saved = pr.h != null && pr.a != null;
          const isEditing = !!editing[m.id] || (!saved && !locked);
          const d = draft[m.id] || (isEditing ? pr : {});
          const draftComplete = (draft[m.id] || pr).h != null && (draft[m.id] || pr).a != null;
          return (
            <div key={m.id} style={{ marginBottom: 5 }}>
              <div className="pm-card" style={S.row}>
                <div style={S.rowMeta}><span style={S.rowTime}>{dd}</span><span style={{ ...S.rowTime, opacity: .4 }}>{hh}</span></div>
                <div style={{ ...S.rowTeam, ...(wH ? S.bracketWin : {}) }}><span style={S.rowFlag}>{flag(homeT)}</span><span style={S.rowName}>{homeT}</span></div>
                <input className="pm-inp" type="number" min="0" value={isEditing ? (d.h ?? "") : (pr.h ?? "")} onChange={(e) => setDraftScore(m.id, "h", e.target.value)} style={{ ...S.rowInp, ...(saved && !isEditing ? S.rowInpSaved : {}) }} disabled={locked || !isEditing} />
                <span style={S.rowColon}>:</span>
                <input className="pm-inp" type="number" min="0" value={isEditing ? (d.a ?? "") : (pr.a ?? "")} onChange={(e) => setDraftScore(m.id, "a", e.target.value)} style={{ ...S.rowInp, ...(saved && !isEditing ? S.rowInpSaved : {}) }} disabled={locked || !isEditing} />
                <div style={{ ...S.rowTeam, justifyContent: "flex-end", textAlign: "right", ...(wA ? S.bracketWin : {}) }}><span style={S.rowName}>{awayT}</span><span style={S.rowFlag}>{flag(awayT)}</span></div>
                <div style={S.rowAction}>
                  {locked ? (
                    closed ? <span style={{ color: s === 3 ? "#22c55e" : s === 1 ? "#ffcd00" : "#a85", fontWeight: 700, fontSize: 10.5 }}>+{s} · {res.h}-{res.a}</span>
                      : <span style={S.liveTag}><span className="pm-live-dot" style={S.liveDot} />EN VIVO</span>
                  ) : justSaved[m.id] ? (
                    <span className="pm-saved" style={S.savedFlash}>✓ ¡Guardado!</span>
                  ) : isEditing ? (
                    <button onClick={() => savePred(m.id)} disabled={!draftComplete || savingMatch[m.id]} style={{ ...S.saveBtn, ...(draftComplete && !savingMatch[m.id] ? {} : S.saveBtnOff) }}>{savingMatch[m.id] ? "Guardando…" : "Guardar"}</button>
                  ) : (
                    <button onClick={() => editPred(m.id)} style={S.editBtn}>✓ Editar</button>
                  )}
                </div>
              </div>
              {locked && (
                <div style={{ marginTop: 4 }}>
                  <button onClick={() => setExpanded((x) => ({ ...x, [m.id]: !x[m.id] }))} style={S.revealToggle}>
                    {expanded[m.id] ? "▲ Ocultar apuestas" : `👥 Ver apuestas (${betCount(m.id)})`}
                  </button>
                  {expanded[m.id] && (
                    <div style={S.reveal}>
                      {PLAYERS.map((p) => {
                        const pp = predictions[m.id]?.[p]; const has = pp && pp.h != null && pp.a != null; const ps = scorePrediction(pp, res);
                        return <div key={p} style={{ ...S.revealItem, ...(p === me ? { borderColor: "#ffcd00" } : {}) }}><span style={{ opacity: .8 }}>{p}</span><span style={{ fontWeight: 700 }}>{has ? `${pp.h}-${pp.a}` : "—"}</span>{has && closed && <span style={{ fontSize: 10, color: ps === 3 ? "#22c55e" : ps === 1 ? "#ffcd00" : "#a85", fontWeight: 700 }}>+{ps}</span>}</div>;
                      })}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        };
        // ¿Hay eliminatorias con resultado o ya empezadas? (para mostrar la sección)
        const koGames = matches.filter((m) => isKO(m.group));
        const koByRound = KO_ROUNDS.filter((r) => koGames.some((m) => m.group === r)).map((r) => ({ round: r, games: koGames.filter((m) => m.group === r) }));
        return (
        <div className="pm-rise">
          <p style={S.hint}>Predice el marcador. <b style={{ color: "#ffcd00" }}>3 pts</b> exacto, <b style={{ color: "#ffcd00" }}>1 pt</b> por acertar quién gana. 🕐 Horas en <b>tu hora local</b>. La apuesta se cierra para todos al arrancar el partido y ahí se revelan todas.</p>
          {koByRound.length > 0 && (
            <div style={{ marginBottom: 10 }}>
              <div style={{ ...S.dateLabel, color: "#ffcd00", fontSize: 22 }}>⚔️ ELIMINATORIAS</div>
              <p style={{ fontSize: 12.5, opacity: .65, marginBottom: 16 }}>Marcador de los <b>90 minutos</b> (sin tiempo extra ni penaltis). Los equipos aparecen cuando se definen los cruces.</p>

                <div key={round} style={{ marginBottom: 22 }}>
                  <div style={S.dateLabel}>{round}</div>
                  {games.map((m) => BetRow(m))}
                </div>
              ))}
              <div style={{ borderTop: "2px solid #27396b", paddingTop: 20, marginTop: 6, marginBottom: 6 }}>
                <div style={{ ...S.dateLabel, fontSize: 22 }}>🌎 FASE DE GRUPOS</div>
              </div>
            </div>
          )}
          {Object.entries(grouped).filter(([grp]) => !isKO(grp)).map(([grp, ms]) => (
            <div key={grp} style={{ marginBottom: 22 }}>
              <div style={S.dateLabel}>Grupo {grp}</div>
              {ms.map((m) => BetRow(m))}
            </div>
          ))}
        </div>
        );
      })()}

      {tab === "campeon" && (() => {
        const champClosed = !!realChampion || now >= CHAMPION_DEADLINE;
        return (
        <div className="pm-rise">
          <div style={S.champHero}>
            <div style={S.champGlow} />
            <svg viewBox="0 0 120 150" width="92" height="115" className="pm-trophy" style={{ position: "relative", filter: "drop-shadow(0 10px 24px rgba(212,160,23,.45))" }}>
              <defs><linearGradient id="goldCup" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#ffe65c"/><stop offset="45%" stopColor="#ffcd00"/><stop offset="100%" stopColor="#cc9e00"/></linearGradient></defs>
              <path d="M35 20 H85 V42 Q85 70 60 78 Q35 70 35 42 Z" fill="url(#goldCup)" stroke="#b38f00" strokeWidth="1.5"/>
              <path d="M35 26 Q18 28 20 44 Q22 56 35 54" fill="none" stroke="url(#goldCup)" strokeWidth="5"/>
              <path d="M85 26 Q102 28 100 44 Q98 56 85 54" fill="none" stroke="url(#goldCup)" strokeWidth="5"/>
              <rect x="55" y="78" width="10" height="16" fill="url(#goldCup)"/>
              <path d="M44 94 H76 L72 104 H48 Z" fill="url(#goldCup)" stroke="#b38f00" strokeWidth="1"/>
              <rect x="42" y="104" width="36" height="8" rx="2" fill="#cc9e00"/>
              <rect x="38" y="112" width="44" height="9" rx="2" fill="url(#goldCup)" stroke="#b38f00" strokeWidth="1"/>
            </svg>
            <div className="pm-shine" style={{ ...S.bracketRoundLabel, fontSize: 26, marginTop: 10, marginBottom: 2 }}>¿Quién levanta la copa?</div>
            <div style={{ fontSize: 13, opacity: .7, position: "relative" }}>Elige tu campeón del mundo · vale <b style={{ color: "#ffcd00" }}>{CHAMPION_PTS} pts</b> extra 🔥</div>
          </div>
          <div className="pm-card pm-leader" style={S.champPickCard}>
            {champions[me] ? <div style={S.champBig}><span style={{ fontSize: 64, display: "block" }}>{flag(champions[me])}</span><div className="pm-shine" style={{ fontFamily: "'Anton',sans-serif", fontSize: 32, marginTop: 4 }}>{champions[me]}</div><div style={{ fontSize: 12, opacity: .6, marginTop: 4 }}>tu elección de {me}</div></div>
              : <div style={{ fontSize: 15, opacity: .7, padding: "8px 0 14px" }}>👇 Toca abajo y elige tu campeón, {me}</div>}
            <select value={champions[me] || ""} onChange={(e) => saveChampions({ ...champions, [me]: e.target.value })} style={S.champSelect} disabled={champClosed}>
              <option value="">— Elige tu campeón —</option>
              {[...new Set(CHAMPION_PICKS)].map((c) => <option key={c} value={c}>{flag(c)} {c}</option>)}
            </select>
            {champClosed
              ? <div style={{ fontSize: 12, opacity: .7, marginTop: 10 }}>🔒 Las apuestas de campeón están cerradas{realChampion ? "" : " (cerraron el 28 de junio, al empezar las eliminatorias)"}.</div>
              : <div style={{ fontSize: 12, opacity: .6, marginTop: 10 }}>⏳ Puedes elegir o cambiar tu campeón hasta el <b style={{ color: "#ffcd00" }}>28 de junio</b> (inicio de eliminatorias).</div>}
          </div>
          <div style={S.groupLabel}>Apuestas del grupo</div>
          <div style={S.champGrid}>
            {PLAYERS.map((p) => (
              <div key={p} className="pm-card" style={{ ...S.champCell, ...(realChampion && champions[p] === realChampion ? { borderColor: "#ffcd00", background: "linear-gradient(100deg,#0a1a3a,#0e1a33)" } : {}) }}>
                <span style={{ fontSize: 13, fontWeight: 700 }}>{p}</span>
                <span style={{ fontSize: 14 }}>{champions[p] ? `${flag(champions[p])} ${champions[p]}` : <span style={{ opacity: .4 }}>sin elegir</span>}{realChampion && champions[p] === realChampion && " 🏆"}</span>
              </div>
            ))}
          </div>
          {realChampion && <div style={S.champOfficial}><span style={{ fontSize: 12, letterSpacing: 2, opacity: .6 }}>🏆 CAMPEÓN OFICIAL</span><div style={{ fontSize: 56, marginTop: 6 }}>{flag(realChampion)}</div><div className="pm-shine" style={{ fontFamily: "'Anton',sans-serif", fontSize: 36 }}>{realChampion}</div></div>}
        </div>
        );
      })()}

      {tab === "bracket" && (
        <div className="pm-rise">
          <p style={S.hint}>Llave del torneo para <b>ver</b> cómo va quedando. Para apostar los cruces, ve a la pestaña <b style={{ color: "#ffcd00" }}>Apostar</b> (sección Eliminatorias).</p>
          {bracket.length === 0 ? (
            <div style={S.bracketEmpty}><div style={{ fontSize: 40, marginBottom: 10 }}>🗝️</div><div style={{ fontWeight: 700, fontSize: 17, marginBottom: 6 }}>Todavía no hay eliminatorias</div><div style={{ fontSize: 14, opacity: .65, maxWidth: 380, margin: "0 auto" }}>Aparecerán aquí como llave cuando se agreguen.</div></div>
          ) : (() => {
            const Card = (m, isFinal) => {
              const pr = predictions[m.id]?.[me] || {}; const res = results[m.id] || {};
              const closed = res.h != null && res.a != null;
              const s = scorePrediction(pr, res); const wH = closed && res.h > res.a, wA = closed && res.a > res.h; const count = betCount(m.id);
              const homeT = resolveSlot(m.home), awayT = resolveSlot(m.away);
              const myH = pr.h != null ? pr.h : "·", myA = pr.a != null ? pr.a : "·";
              return (
                <div key={m.id} className="pm-card" style={{ ...S.koGame, ...(isFinal ? S.bracketFinal : {}) }}>
                  <div style={{ ...S.koTeam, ...(wH ? S.bracketWin : {}) }}><span style={S.koName}>{flag(homeT)} {homeT}</span><span style={S.koScoreView}>{closed ? res.h : myH}</span></div>
                  <div style={{ ...S.koTeam, ...(wA ? S.bracketWin : {}), borderTop: "1px solid #1a2a4d" }}><span style={S.koName}>{flag(awayT)} {awayT}</span><span style={S.koScoreView}>{closed ? res.a : myA}</span></div>
                  <div style={S.koMeta}><span>{(m.date || "").split(" · ")[0]}</span>{closed ? <span style={{ color: s === 3 ? "#22c55e" : s === 1 ? "#ffcd00" : "#a85", fontWeight: 700 }}>+{s} · {res.h}-{res.a}</span> : <span>{(pr.h != null && pr.a != null) ? "tu apuesta" : "apostar en Apostar"}</span>}</div>
                </div>
              );
            };
            return (
              <div style={S.koScroll}><div style={S.koTree}>
                <div style={{ width: "100%", fontSize: 12, opacity: .7, marginBottom: 10, paddingLeft: 4 }}>👁️ Esta es la llave para <b>ver</b> cómo va el torneo. Para <b>apostar</b>, ve a la pestaña <b style={{ color: "#ffcd00" }}>Apostar</b>.</div>
                {bracket.map(({ round, games }, ri) => (
                  <div key={round} style={S.koTreeCol}>
                    <div style={{ ...S.bracketRoundLabel, fontSize: 12 }}>{round}</div>
                    <div style={S.koTreeGames}>{games.map((m) => (<div key={m.id} style={S.koTreePair}>{Card(m, round === "Final")}{ri < bracket.length - 1 && <span style={S.connOut} />}{ri > 0 && <span style={S.connIn} />}</div>))}</div>
                  </div>
                ))}
                {realChampion && <div style={S.koTreeCol}><div style={{ ...S.bracketRoundLabel, fontSize: 12 }}>Campeón</div><div style={S.koTreeGames}><div style={S.koTreePair}><div style={S.koChampBox}><div className="pm-trophy" style={{ fontSize: 32 }}>🏆</div><div style={{ fontSize: 30, marginTop: 4 }}>{flag(realChampion)}</div><div className="pm-shine" style={{ fontFamily: "'Anton',sans-serif", fontSize: 18 }}>{realChampion}</div></div><span style={S.connIn} /></div></div></div>}
              </div></div>
            );
          })()}
        </div>
      )}

      {tab === "tabla" && (
        <div className="pm-rise">
          <p style={S.hint}>Posiciones en vivo. 🎯 rey del exacto · 🔥 racha activa · ⚡ mejor racha · 🏆 acertó el campeón.</p>
          <div style={S.tieNote}>En caso de empate en puntos, va arriba quien tenga <b style={{ color: "#ffcd00" }}>más marcadores exactos</b>; si sigue el empate, más aciertos.</div>
          {(() => {
            return standings.map((row, i) => {
              const isLeader = i === 0;
              const isMe = row.name === me;
              const rankColor = i === 1 ? "#9fb2d8" : i === 2 ? "#c08642" : "#5a6f9e";
              return (
                <div key={row.name} className={"pm-rankrise" + (isLeader ? " pm-champ-card" : "")} style={{ ...S.cardRow, ...(isLeader ? S.cardRowLeader : {}), ...(isMe && !isLeader ? { borderColor: "#ffcd00" } : {}), animationDelay: (i * 0.04) + "s" }}>
                  <div style={S.epicTopRow}>
                    {isLeader ? (
                      <div style={S.miniMedal}>🥇</div>
                    ) : (i === 1 || i === 2) ? (
                      <div style={S.miniMedal}>{i === 1 ? "🥈" : "🥉"}</div>
                    ) : (
                      <div style={{ ...S.miniRank, color: rankColor }}>{i + 1}</div>
                    )}
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={S.miniName}>{row.name}{isMe && <span style={S.epicYou}>TÚ</span>}</div>
                      <div style={{ ...S.epicStatsRow, marginTop: 4 }}>
                        <span style={S.epicStat}><b style={{ color: "#ffcd00" }}>{row.exact}</b> exactos</span>
                        <span style={S.epicDot} />
                        <span style={S.epicStat}><b style={{ color: "#ffcd00" }}>{row.hits}</b> aciertos</span>
                        {row.streak >= 3 && <><span style={S.epicDot} /><span style={S.epicStat}>racha <b style={{ color: "#ff6b3d" }}>{row.streak}</b></span></>}
                      </div>
                    </div>
                    <div style={S.epicPtsBox}>
                      <div className={isLeader ? "pm-shine" : ""} style={S.miniPts}>{row.pts}</div>
                      <div style={S.miniPtsLbl}>PTS</div>
                    </div>
                  </div>
                  {row.badges.length > 0 && <div style={S.miniBadges}>{row.badges.map((b, j) => <span key={j} title={b.t} style={S.badgeChip}>{b.e}</span>)}</div>}
                </div>
              );
            });
          })()}
        </div>
      )}

      {me === ADMIN && <button onClick={() => setAdminOpen(!adminOpen)} style={S.adminToggle}>{adminOpen ? "× Cerrar admin" : "⚙ Admin · resultados y partidos"}</button>}

      {adminOpen && me === ADMIN && (
        <div style={S.adminPanel} className="pm-rise">
          <div style={S.resyncBox}>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 700, fontSize: 13, color: "#ffcd00" }}>🕐 Corregir horas de los partidos</div>
              <div style={{ fontSize: 11.5, opacity: .7, marginTop: 2 }}>Actualiza fechas/horas del fixture. No borra apuestas ni resultados.</div>
            </div>
            <button onClick={resyncFixture} style={S.resyncBtn}>Resincronizar</button>
          </div>
          <h3 style={S.adminH}>👥 Jugadores ({players.length})</h3>
          <div style={S.playerChips}>
            {players.map((p) => (
              <span key={p} style={S.playerChip}>
                {p}{p === ADMIN ? <span style={{ fontSize: 9, opacity: .6, marginLeft: 4 }}>admin</span>
                  : <button onClick={() => removePlayer(p)} style={S.playerRemove} title="Quitar">×</button>}
              </span>
            ))}
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>
            <input placeholder="Nombre del nuevo jugador" value={newPlayer}
              onChange={(e) => setNewPlayer(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") { addPlayer(newPlayer); setNewPlayer(""); } }}
              style={{ ...S.adminText, flex: 1 }} />
            <button onClick={() => { addPlayer(newPlayer); setNewPlayer(""); }} style={S.addBtn}>+ Agregar</button>
          </div>
          <p style={{ fontSize: 11, opacity: .55, margin: "4px 0 0" }}>El jugador nuevo aparecerá en el popup de inicio y en la tabla. Quitar a alguien no borra lo que ya apostó.</p>

          <h3 style={{ ...S.adminH, marginTop: 24 }}>✏️ Editar apuesta de un jugador</h3>
          <p style={{ fontSize: 11.5, opacity: .65, margin: "0 0 10px" }}>Para corregir apuestas (ej. a alguien se le olvidó guardar). Funciona incluso si el partido ya empezó.</p>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", marginBottom: 8 }}>
            <select value={adminEdit.player} onChange={(e) => setAdminEdit({ ...adminEdit, player: e.target.value })} style={S.adminText}>
              <option value="">— Jugador —</option>
              {players.map((p) => <option key={p} value={p}>{p}</option>)}
            </select>
            <select value={adminEdit.matchId} onChange={(e) => setAdminEdit({ ...adminEdit, matchId: e.target.value })} style={{ ...S.adminText, maxWidth: 220 }}>
              <option value="">— Partido —</option>
              {matches.map((m) => <option key={m.id} value={m.id}>{m.home} vs {m.away} ({(m.date || "").split(" · ")[0]})</option>)}
            </select>
            <input type="number" min="0" placeholder="L" value={adminEdit.h} onChange={(e) => setAdminEdit({ ...adminEdit, h: e.target.value })} style={S.adminInp} />
            <span style={{ opacity: .5 }}>:</span>
            <input type="number" min="0" placeholder="V" value={adminEdit.a} onChange={(e) => setAdminEdit({ ...adminEdit, a: e.target.value })} style={S.adminInp} />
            <button onClick={adminSavePrediction} style={S.addBtn}>Guardar apuesta</button>
          </div>
          {adminEdit.player && adminEdit.matchId && predictions[adminEdit.matchId]?.[adminEdit.player] && (
            <p style={{ fontSize: 11.5, opacity: .7, margin: "0 0 8px" }}>
              Apuesta actual de {adminEdit.player}: <b>{predictions[adminEdit.matchId][adminEdit.player].h}-{predictions[adminEdit.matchId][adminEdit.player].a}</b>
            </p>
          )}

          <h3 style={{ ...S.adminH, marginTop: 24 }}>Cargar resultados oficiales</h3>
          <p style={{ fontSize: 11.5, opacity: .65, margin: "0 0 10px" }}>Al cargar un resultado de eliminatoria con ganador, el equipo pasa solo a la siguiente ronda. Si quedan empatados (penaltis), elige abajo quién avanzó.</p>
          {matches.map((m) => {
            const res = results[m.id] || {};
            const homeT = resolveSlot(m.home), awayT = resolveSlot(m.away);
            const koTie = isKO(m.group) && ADVANCE[m.id] && res.h != null && res.a != null && res.h === res.a;
            return (
              <div key={m.id} style={{ ...S.adminRow, flexWrap: "wrap" }}>
                <span style={{ flex: 1, fontSize: 13, minWidth: 160 }}>{flag(homeT)} {homeT} vs {awayT} {flag(awayT)}</span>
                <input className="pm-inp" type="number" min="0" value={res.h ?? ""} onChange={(e) => setResult(m.id, "h", e.target.value)} style={S.adminInp} />
                <span style={{ opacity: .5 }}>:</span>
                <input className="pm-inp" type="number" min="0" value={res.a ?? ""} onChange={(e) => setResult(m.id, "a", e.target.value)} style={S.adminInp} />
                {isKO(m.group) && !ADVANCE[m.id] && <button onClick={() => delMatch(m.id)} style={S.delBtn}>borrar</button>}
                {koTie && (
                  <div style={{ width: "100%", display: "flex", alignItems: "center", gap: 6, marginTop: 4 }}>
                    <span style={{ fontSize: 11, color: "#ffcd00" }}>🥅 Pasó (penaltis):</span>
                    <button onClick={() => advanceWinner(m.id, homeT)} style={S.tieBtn}>{homeT}</button>
                    <button onClick={() => advanceWinner(m.id, awayT)} style={S.tieBtn}>{awayT}</button>
                  </div>
                )}
              </div>
            );
          })}
          <h3 style={{ ...S.adminH, marginTop: 24 }}>Definir campeón oficial</h3>
          <select value={realChampion} onChange={(e) => saveRealChampion(e.target.value)} style={{ ...S.adminText, minWidth: 200 }}>
            <option value="">— Sin definir —</option>
            {[...new Set(CHAMPION_PICKS)].map((c) => <option key={c} value={c}>{flag(c)} {c}</option>)}
          </select>
          <h3 style={{ ...S.adminH, marginTop: 24 }}>🗝️ Definir equipos del bracket</h3>
          <p style={{ fontSize: 11.5, opacity: .65, margin: "0 0 12px" }}>Los 1º y 2º de grupo se llenan solos. Aquí pones los <b>terceros</b> y los <b>ganadores que avanzan</b>. Elige el país real para cada lado del cruce.</p>
          {matches.filter((m) => isKO(m.group)).map((m) => (
            <div key={m.id} style={S.koEditRow}>
              <span style={S.koEditPhase}>{m.group.slice(0, 3)}</span>
              <select value={CHAMPION_PICKS.includes(m.home) ? m.home : ""} onChange={(e) => setKOTeam(m.id, "home", e.target.value || m.home)} style={S.koEditSel}>
                <option value="">{m.home}</option>
                {[...new Set(CHAMPION_PICKS)].sort().map((c) => <option key={c} value={c}>{flag(c)} {c}</option>)}
              </select>
              <span style={{ opacity: .4, fontSize: 11 }}>vs</span>
              <select value={CHAMPION_PICKS.includes(m.away) ? m.away : ""} onChange={(e) => setKOTeam(m.id, "away", e.target.value || m.away)} style={S.koEditSel}>
                <option value="">{m.away}</option>
                {[...new Set(CHAMPION_PICKS)].sort().map((c) => <option key={c} value={c}>{flag(c)} {c}</option>)}
              </select>
            </div>
          ))}

          <h3 style={{ ...S.adminH, marginTop: 24 }}>Agregar partido (eliminatorias)</h3>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
            <input placeholder="Fase (Octavos, Cuartos, Final…)" value={newM.group} onChange={(e) => setNewM({ ...newM, group: e.target.value })} style={S.adminText} />
            <input placeholder="Local" value={newM.home} onChange={(e) => setNewM({ ...newM, home: e.target.value })} style={S.adminText} />
            <input placeholder="Visitante" value={newM.away} onChange={(e) => setNewM({ ...newM, away: e.target.value })} style={S.adminText} />
            <input placeholder="Fecha (ej. Sáb 4 Jul · 4:00 PM)" value={newM.date} onChange={(e) => setNewM({ ...newM, date: e.target.value })} style={{ ...S.adminText, width: 200 }} />
            <button onClick={addMatch} style={S.addBtn}>+ Agregar</button>
          </div>
        </div>
      )}
    </div>
  );
}
